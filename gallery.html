<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - AgarthianRot</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
            box-sizing: border-box;
            margin: 0;
            background-color: #1a1a1a;
            color: white;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        .container {
            width: 100%;
            max-width: 1000px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .header a {
            color: #FF6B6B;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.2s ease;
        }

        .header a:hover {
            color: #845EC2;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
        }

        .upload-container {
            background-color: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .form-group input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #444;
            border-radius: 4px;
            background-color: #333;
            color: white;
            box-sizing: border-box;
            font-family: inherit;
        }

        .form-group input[type="file"] {
            width: 100%;
            padding: 10px;
            background-color: #333;
            border-radius: 4px;
            color: #ddd;
        }

        button {
            background-color: #845EC2;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: background-color 0.2s ease;
        }

        button:hover {
            background-color: #FF6B6B;
        }

        button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .gallery-item {
            background-color: #2a2a2a;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s ease;
        }

        .gallery-item:hover {
            transform: translateY(-5px);
        }

        .gallery-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }

        .gallery-details {
            padding: 15px;
        }

        .gallery-details h3 {
            margin: 0 0 5px 0;
            color: #FF6B6B;
            font-size: 1.2rem;
        }

        .gallery-details p {
            margin: 0;
            color: #aaa;
            font-size: 0.9rem;
        }

        #loading {
            text-align: center;
            color: #845EC2;
            font-weight: bold;
            margin: 20px 0;
            grid-column: 1 / -1;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Image Gallery</h1>
            <a href="index.html">&larr; Back to Home</a>
        </div>

        <div class="upload-container">
            <h2 style="margin-top: 0;">Upload a New Image</h2>
            <form id="uploadForm">
                <div class="form-group">
                    <label for="imageTitle">Title</label>
                    <input type="text" id="imageTitle" required placeholder="Give your image a title...">
                </div>
                <div class="form-group">
                    <label for="imageFile">Select Image</label>
                    <input type="file" id="imageFile" accept="image/*" required>
                </div>
                <button type="submit" id="submitBtn">Upload Image</button>
            </form>
        </div>

        <h2>Gallery</h2>
        <div class="gallery-grid" id="galleryGrid">
            <div id="loading">Loading gallery...</div>
            <!-- Images will be injected here by JavaScript -->
        </div>
    </div>

    <!-- Supabase SDK Setup -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
        // Import your Supabase config (we will create this in the next step!)
        import supabaseConfig from './supabaseConfig.js';

        // Initialize Supabase Client
        const { createClient } = window.supabase;
        const supabase = createClient(supabaseConfig.url, supabaseConfig.anonKey);

        const uploadForm = document.getElementById('uploadForm');
        const titleInput = document.getElementById('imageTitle');
        const fileInput = document.getElementById('imageFile');
        const submitBtn = document.getElementById('submitBtn');
        const galleryGrid = document.getElementById('galleryGrid');
        const loading = document.getElementById('loading');

        // Function to load images from the database
        async function loadGallery() {
            galleryGrid.innerHTML = '<div id="loading">Loading gallery...</div>';

            try {
                // Fetch all rows from the 'gallery' table, ordered by newest first
                const { data, error } = await supabase
                    .from('gallery')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                galleryGrid.innerHTML = ''; // Clear loading text

                if (!data || data.length === 0) {
                    galleryGrid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #aaa;">No images yet. Upload one above!</p>';
                    return;
                }

                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'gallery-item';

                    const dateObj = new Date(item.created_at);
                    const dateStr = dateObj.toLocaleDateString();

                    card.innerHTML = `
                        <img src="${escapeHtml(item.image_url)}" alt="${escapeHtml(item.title)}" loading="lazy">
                        <div class="gallery-details">
                            <h3>${escapeHtml(item.title)}</h3>
                            <p>Added ${dateStr}</p>
                        </div>
                    `;
                    galleryGrid.appendChild(card);
                });

            } catch (error) {
                console.error("Error loading gallery:", error);
                galleryGrid.innerHTML = '<p style="grid-column: 1/-1; color: #FF6B6B; text-align: center; padding: 20px; background: #2a2a2a; border-radius: 8px;">Error connecting to Supabase.<br>Please ensure your config is correct and the `gallery` table exists.</p>';
            }
        }

        // Handle Image Upload
        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const title = titleInput.value.trim();
            const file = fileInput.files[0];

            if (!title || !file) return;

            const originalBtnText = submitBtn.innerText;
            submitBtn.innerText = "Uploading...";
            submitBtn.disabled = true;

            try {
                // 1. Upload the physical file to Supabase Storage
                // Create a unique file name to prevent overwriting
                const fileExt = file.name.split('.').pop();
                const fileName = `${Date.now()}-${Math.random().toString(36).substring(2)}.${fileExt}`;
                const filePath = `uploads/${fileName}`;

                const { data: uploadData, error: uploadError } = await supabase.storage
                    .from('gallery-images')
                    .upload(filePath, file);

                if (uploadError) throw uploadError;

                // 2. Get the public URL for the image we just uploaded
                const { data: publicUrlData } = supabase.storage
                    .from('gallery-images')
                    .getPublicUrl(filePath);

                const publicUrl = publicUrlData.publicUrl;

                // 3. Save the title and image URL to the Supabase Database table
                const { error: dbError } = await supabase
                    .from('gallery')
                    .insert([
                        { title: title, image_url: publicUrl }
                    ]);

                if (dbError) throw dbError;

                // Success! Reset form and reload gallery
                uploadForm.reset();
                loadGallery(); // Refresh the grid

            } catch (error) {
                console.error("Upload Error:", error);
                alert("Error uploading image. Check console for details. Make sure your Storage bucket and Database table are set up correctly with public access policies.");
            } finally {
                submitBtn.innerText = originalBtnText;
                submitBtn.disabled = false;
            }
        });

        // Helper function to prevent Cross-Site Scripting (XSS)
        function escapeHtml(unsafe) {
            if (!unsafe) return "";
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Initial load
        loadGallery();
    </script>
</body>

</html>
